; dev only — docker-compose.softphone-dev.yml で http.conf としてマウント
; 本番 asterisk/http.conf は loopback のまま（T-SEC-A05-001）

[general]
enabled=yes
bindaddr=0.0.0.0
bindport=8088
tlsenable=yes
tlsbindaddr=0.0.0.0:8089
tlscertfile=/etc/asterisk/certs/asterisk.pem
tlsprivatekey=/etc/asterisk/certs/asterisk.key
