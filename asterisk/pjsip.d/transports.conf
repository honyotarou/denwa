; denwa Phase 2.5 smoke seed (templates + transports). Full render → @openpbx/infra in §5.

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
cert_file=/etc/asterisk/certs/asterisk.pem
priv_key_file=/etc/asterisk/certs/asterisk.key

[endpoint-internal](!)
type=endpoint
context=internal
disallow=all
allow=ulaw
allow=alaw
allow=opus
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[endpoint-webrtc](!)
type=endpoint
context=internal
disallow=all
allow=opus
allow=ulaw
allow=alaw
webrtc=yes
use_avpf=yes
media_use_received_transport=yes
rtcp_mux=yes
dtls_auto_generate_cert=yes
dtls_verify=fingerprint
ice_support=yes
transport=transport-wss
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[auth-userpass](!)
type=auth
auth_type=userpass

[aor-single](!)
type=aor
max_contacts=2
remove_existing=yes
qualify_frequency=30
