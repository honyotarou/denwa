; Asterisk Manager Interface (AMI)
; Web container (Docker bridge network: 172.x) から購読する用。
; ホスト側へは publish しない (docker-compose で port mapping しない)。

[general]
enabled = yes
port = 5038
bindaddr = 0.0.0.0

[command-room]
secret = command-room-ami-secret
; Docker default bridge 172.16.0.0/12 のみ（172.0.0.0/8 禁止 T-SEC-004 / T-PROD-006）
deny = 0.0.0.0/0.0.0.0
permit = 172.16.0.0/255.240.0.0
permit = 127.0.0.1/255.255.255.255
read = call,cdr,dialplan,reporting,system
write = call,originate,system
