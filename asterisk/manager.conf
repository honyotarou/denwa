; Local dev: copy from manager.conf.template and substitute secret, or use Docker entrypoint.
; Tracked file uses placeholder only (T-PROD-002).

[general]
enabled = yes
port = 5038
bindaddr = 0.0.0.0

[command-room]
secret = __AMI_SECRET__
deny = 0.0.0.0/0.0.0.0
permit = 172.28.0.0/255.255.0.0
permit = 127.0.0.1/255.255.255.255
read = call,cdr,dialplan,reporting,system
write = call,originate,system
