# https://github.com/evilmartians/lefthook
# After clone: npm install  (prepare → lefthook install)
#
# Cursor hooks (毎回):
#   preToolUse  → check:static
#   postToolUse → harness:fast (static + all typechecks)
#   stop        → npm run harness (full)
#
# Git:
#   pre-commit  → harness:fast（static + typecheck）
#   pre-push    → npm run harness（full = CI と同じ）
pre-commit:
  commands:
    harness-fast:
      run: npm run harness:fast
      glob:
        - "packages/**/*"
        - "apps/**/*"
        - "scripts/**/*"
        - "package.json"
        - "package-lock.json"

pre-push:
  commands:
    harness-full:
      run: npm run harness
