# https://github.com/evilmartians/lefthook
# After clone: npm install  (prepare → lefthook install)
#
# Cursor hooks (毎回): preToolUse/postToolUse/afterFileEdit → check:static
#                     stop（ソース変更時）→ npm run harness
#
# Git:
#   pre-commit  → check:static のみ（速い）
#   pre-push    → npm run harness（full・最終門番）
pre-commit:
  commands:
    static:
      run: npm run check:static
      glob:
        - "packages/**/*"
        - "apps/**/*"
        - "scripts/**/*"
        - "docs/**/*"
        - "package.json"
        - "package-lock.json"

pre-push:
  commands:
    harness-full:
      run: npm run harness
