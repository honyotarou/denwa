name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    name: harness (full — same as pre-push)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      attestations: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Native deps (better-sqlite3 + xvfb for G5b extension e2e)
        run: sudo apt-get update && sudo apt-get install -y python3 make g++ xvfb

      - name: Install
        run: npm ci

      - name: Playwright browser
        run: npx playwright install chromium --with-deps

      - name: harness
        run: xvfb-run -a npm run harness

      - name: SBOM (CycloneDX)
        run: npx --yes @cyclonedx/cyclonedx-npm@1.19.3 --output-file sbom.json --output-format json

      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@49df96e17e918a15956db358890b08e61c704919 # v1.2.0
        with:
          subject-path: sbom.json
