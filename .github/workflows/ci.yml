name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    name: harness (full — same as pre-push)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Native deps for better-sqlite3
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - name: Install
        run: npm ci

      - name: harness
        run: npm run harness
